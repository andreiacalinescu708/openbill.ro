<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil - oBill</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="global.css" />
  <style>
    /* Base styles */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-primary, #0f172a);
      color: var(--text-primary, #f8fafc);
      margin: 0;
      min-height: 100vh;
    }
    
    /* Navbar */
    .navbar {
      background: rgba(30, 41, 59, 0.7);
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      backdrop-filter: blur(10px);
      padding: 0.75rem 1rem;
    }
    
    .navbar-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .navbar-brand {
      text-decoration: none;
    }
    
    .navbar-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    /* Container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem;
    }
    
    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.625rem 1rem;
      border-radius: 8px;
      border: none;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }
    
    .btn-ghost {
      background: transparent;
      color: #94a3b8;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    
    .btn-ghost:hover {
      background: rgba(148, 163, 184, 0.1);
      color: #f8fafc;
    }
    
    .btn-icon {
      padding: 0.5rem;
      font-size: 1.25rem;
    }
    
    .btn-sm {
      padding: 0.5rem 0.875rem;
      font-size: 0.875rem;
    }
    
    /* Form elements */
    .form-group {
      margin-bottom: 1rem;
    }
    
    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #cbd5e1;
      margin-bottom: 0.375rem;
    }
    
    .form-input {
      width: 100%;
      padding: 0.625rem 0.875rem;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 8px;
      color: #f8fafc;
      font-size: 0.9375rem;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }
    
    .form-input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    
    .form-input::placeholder {
      color: #64748b;
    }
    
    /* Card */
    .card-header {
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      margin-bottom: 1.5rem;
    }
    
    .card-header h3 {
      margin: 0;
      font-size: 1.125rem;
      font-weight: 600;
      color: #f8fafc;
    }
    
    /* User dropdown */
    .user-menu {
      position: relative;
    }
    
    .dropdown-menu {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 8px;
      background: #1e293b;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 12px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
      min-width: 200px;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.2s ease;
      padding: 8px 0;
    }
    
    .dropdown-menu.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    
    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 10px 16px;
      color: #f8fafc;
      text-decoration: none;
      font-size: 0.9375rem;
      background: none;
      border: none;
      width: 100%;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .dropdown-item:hover {
      background: rgba(148, 163, 184, 0.15);
    }
    
    .dropdown-item.text-danger {
      color: #ef4444;
    }
    
    .dropdown-item.text-danger:hover {
      background: rgba(239, 68, 68, 0.1);
    }
    
    .dropdown-divider {
      height: 1px;
      background: rgba(148, 163, 184, 0.2);
      margin: 8px 0;
    }
    
    /* Text utilities */
    .text-success { color: #22c55e; }
    .text-danger { color: #ef4444; }
    
    /* Form actions */
    .form-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }
    
    @media (max-width: 640px) {
      .form-actions {
        flex-direction: column;
      }
    }
    
    .profile-container {
      max-width: 600px;
      margin: 2rem auto;
    }
    
    .profile-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--primary-600);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 700;
      color: white;
      margin: 0 auto 1rem;
      border: 4px solid var(--primary-500);
    }
    
    .profile-avatar.large {
      width: 120px;
      height: 120px;
      font-size: 3rem;
    }
    
    .profile-name {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }
    
    .profile-role {
      color: var(--text-secondary);
      font-size: 0.875rem;
    }
    
    .profile-form {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: 1.5rem;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    
    @media (max-width: 640px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
    
    .readonly-field {
      background: var(--bg-elevated);
      padding: 0.75rem 1rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
    }
    
    .readonly-field label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: block;
      margin-bottom: 0.25rem;
    }
    
    .readonly-field .value {
      font-weight: 500;
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none;">
        <img src="favicon.svg" alt="oBill" style="height: 36px; width: auto;">
        <span style="font-size: 1.5rem; font-weight: 700; color: var(--primary-500, #3b82f6);">openBill</span>
      </a>
      <div class="navbar-actions">
        <a href="index.html" class="btn btn-ghost btn-sm">← Înapoi</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="profile-container">
      <div class="profile-header">
        <div class="profile-avatar large" id="profileAvatar">U</div>
        <div class="profile-name" id="profileFullName">Utilizator</div>
        <div class="profile-role" id="profileRole">Rol</div>
      </div>

      <form class="profile-form" id="profileForm">
        <div class="card-header" style="margin-bottom: 1.5rem;">
          <h3>📝 Informații Profil</h3>
        </div>

        <div class="form-row" style="margin-bottom: 1rem;">
          <div class="readonly-field">
            <label>Funcție</label>
            <div class="value" id="displayRole">-</div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="firstName">Nume</label>
            <input type="text" id="firstName" class="form-input" placeholder="Ex: Popescu" />
          </div>
          <div class="form-group">
            <label class="form-label" for="lastName">Prenume</label>
            <input type="text" id="lastName" class="form-input" placeholder="Ex: Ion" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="Ex: ion.popescu@firma.ro" />
        </div>

        <div class="form-group">
          <label class="form-label" for="phone">Telefon</label>
          <input type="tel" id="phone" class="form-input" placeholder="Ex: 0722 123 456" />
        </div>

        <div class="form-group">
          <label class="form-label" for="position">Funcția / Departament</label>
          <input type="text" id="position" class="form-input" placeholder="Ex: Manager Vânzări, Depozit, etc." />
        </div>

        <div id="formMessage" style="margin-bottom: 1rem;"></div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            💾 Salvează modificările
          </button>
          <a href="index.html" class="btn btn-ghost">← Înapoi la Dashboard</a>
        </div>
      </form>
    </div>
  </main>


  <script>
    // Load profile data
    async function loadProfile() {
      try {
        const res = await fetch('/api/me');
        if (!res.ok) throw new Error('Eroare la încărcarea profilului');
        
        const user = await res.json();
        
        // Determinăm funcția corectă
        let roleDisplay = 'Utilizator';
        if (user.is_owner) {
          roleDisplay = 'Administrator Principal';
        } else if (user.role === 'admin') {
          roleDisplay = 'Administrator';
        }
        document.getElementById('displayRole').textContent = roleDisplay;
        
        // Avatar
        const initials = user.first_name && user.last_name 
          ? (user.first_name[0] + user.last_name[0]).toUpperCase()
          : (user.email ? user.email[0].toUpperCase() : 'U');
        document.getElementById('profileAvatar').textContent = initials;
        
        // Full name display
        const fullName = user.first_name && user.last_name 
          ? `${user.first_name} ${user.last_name}`
          : user.email;
        document.getElementById('profileFullName').textContent = fullName;
        // Determinăm funcția pentru header
        let headerRole = user.position;
        if (!headerRole) {
          if (user.is_owner) {
            headerRole = 'Administrator Principal';
          } else if (user.role === 'admin') {
            headerRole = 'Administrator';
          } else {
            headerRole = 'Utilizator';
          }
        }
        document.getElementById('profileRole').textContent = headerRole;
        
        // Fill form
        document.getElementById('firstName').value = user.first_name || '';
        document.getElementById('lastName').value = user.last_name || '';
        document.getElementById('email').value = user.email || '';
        document.getElementById('phone').value = user.phone || '';
        document.getElementById('position').value = user.position || '';
        
      } catch (err) {
        showMessage('Eroare la încărcarea profilului: ' + err.message, 'error');
      }
    }

    // Save profile
    document.getElementById('profileForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const data = {
        first_name: document.getElementById('firstName').value.trim(),
        last_name: document.getElementById('lastName').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        position: document.getElementById('position').value.trim()
      };
      
      try {
        const res = await fetch('/api/me', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Eroare la salvare');
        }
        
        const result = await res.json();
        showMessage('✅ Profil actualizat cu succes! Mergi la Dashboard pentru a vedea modificările.', 'success');
        
        // Update display with new values
        const user = result.user;
        const fullName = user.first_name && user.last_name 
          ? `${user.first_name} ${user.last_name}`
          : user.username;
        document.getElementById('profileFullName').textContent = fullName;
        // Determinăm funcția pentru header
        let headerRole = user.position;
        if (!headerRole) {
          if (user.is_owner) {
            headerRole = 'Administrator Principal';
          } else if (user.role === 'admin') {
            headerRole = 'Administrator';
          } else {
            headerRole = 'Utilizator';
          }
        }
        document.getElementById('profileRole').textContent = headerRole;
        
        const initials = user.first_name && user.last_name 
          ? (user.first_name[0] + user.last_name[0]).toUpperCase()
          : user.username[0].toUpperCase();
        document.getElementById('profileAvatar').textContent = initials;
        
      } catch (err) {
        showMessage(err.message, 'error');
      }
    });

    function showMessage(text, type) {
      const msg = document.getElementById('formMessage');
      msg.textContent = text;
      msg.className = type === 'success' ? 'text-success' : 'text-danger';
      setTimeout(() => msg.textContent = '', 5000);
    }

    // Load on page load
    loadProfile();
  </script>
  <script src="script.js"></script>
</body>
</html>
