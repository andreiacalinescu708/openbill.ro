<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Resetare Parolă - openBill</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="global.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: var(--space-8);
      box-shadow: var(--shadow-xl);
      animation: fadeIn 0.4s ease-out;
    }

    .auth-header {
      text-align: center;
      margin-bottom: var(--space-6);
    }

    .auth-header img {
      height: 50px;
      width: auto;
      margin-bottom: var(--space-4);
    }

    .auth-header h1 {
      font-size: 1.5rem;
      margin-bottom: var(--space-2);
    }

    .auth-header p {
      color: var(--text-muted);
      margin: 0;
    }

    .form-group {
      margin-bottom: var(--space-4);
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: var(--space-2);
    }

    .form-input {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      font-size: 0.9375rem;
      color: var(--text-primary);
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      transition: all var(--transition-fast);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    #messageBox {
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-lg);
      font-size: 0.9rem;
      line-height: 1.5;
      display: none;
      margin-bottom: var(--space-4);
    }

    #messageBox.show {
      display: block;
    }

    .msg-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger-500);
    }

    .msg-success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: var(--success-400);
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <img src="favicon.svg" alt="openBill">
        <h1>🔐 Setează Parola Nouă</h1>
        <p>Introdu parola nouă de două ori pentru confirmare.</p>
      </div>

      <div id="loadingState" style="text-align: center; padding: var(--space-8);">
        <div class="loading"></div>
        <p style="color: var(--text-muted); margin-top: var(--space-4);">Se verifică linkul...</p>
      </div>

      <div id="resetForm" style="display: none;">
        <div id="messageBox"></div>

        <form id="passwordForm">
          <div class="form-group">
            <label class="form-label" for="password">Parola nouă *</label>
            <input type="password" id="password" class="form-input" placeholder="Minim 6 caractere" required minlength="6">
          </div>

          <div class="form-group">
            <label class="form-label" for="confirmPassword">Confirmă parola *</label>
            <input type="password" id="confirmPassword" class="form-input" placeholder="Repetă parola" required>
          </div>

          <button type="submit" class="btn btn-primary btn-lg" id="btnSubmit" style="width: 100%;">
            Salvează parola nouă
          </button>
        </form>
      </div>

      <div id="errorState" style="display: none; text-align: center; padding: var(--space-4);">
        <div style="font-size: 3rem; margin-bottom: var(--space-4);">⚠️</div>
        <h3 style="color: var(--danger-500); margin-bottom: var(--space-2);">Link invalid</h3>
        <p style="color: var(--text-muted);">Acest link a expirat sau a fost deja folosit.</p>
        <a href="forgot-password.html" class="btn btn-primary" style="margin-top: var(--space-4);">Solicită link nou</a>
      </div>

      <div id="successState" style="display: none; text-align: center; padding: var(--space-4);">
        <div style="font-size: 3rem; margin-bottom: var(--space-4);">✅</div>
        <h3 style="color: var(--success-400); margin-bottom: var(--space-2);">Parolă schimbată!</h3>
        <p style="color: var(--text-muted);">Poți acum să te autentifici cu noua parolă.</p>
        <a href="login.html" class="btn btn-primary" style="margin-top: var(--space-4);">Mergi la Login</a>
      </div>
    </div>
  </div>

  <script>
    // Extrage tokenul din URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    const loadingState = document.getElementById('loadingState');
    const resetForm = document.getElementById('resetForm');
    const errorState = document.getElementById('errorState');
    const successState = document.getElementById('successState');
    const messageBox = document.getElementById('messageBox');

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className = 'show msg-' + type;
    }

    function hideMessage() {
      messageBox.className = '';
      messageBox.textContent = '';
    }

    // Verifică tokenul la încărcare
    async function validateToken() {
      if (!token) {
        loadingState.style.display = 'none';
        errorState.style.display = 'block';
        return;
      }

      try {
        const res = await fetch(`/api/auth/validate-reset-token?token=${token}`);
        
        if (res.ok) {
          loadingState.style.display = 'none';
          resetForm.style.display = 'block';
        } else {
          loadingState.style.display = 'none';
          errorState.style.display = 'block';
        }
      } catch (err) {
        console.error('Eroare validare:', err);
        loadingState.style.display = 'none';
        errorState.style.display = 'block';
      }
    }

    // Resetare parolă
    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessage();

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password.length < 6) {
        showMessage('Parola trebuie să aibă minim 6 caractere', 'error');
        return;
      }

      if (password !== confirmPassword) {
        showMessage('Parolele nu coincid', 'error');
        return;
      }

      const btn = document.getElementById('btnSubmit');
      btn.disabled = true;
      btn.innerHTML = '<div class="loading"></div> Se salvează...';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });

        const data = await res.json();

        if (res.ok) {
          resetForm.style.display = 'none';
          successState.style.display = 'block';
        } else {
          showMessage(data.error || 'Eroare la resetare', 'error');
          btn.disabled = false;
          btn.textContent = 'Salvează parola nouă';
        }
      } catch (err) {
        showMessage('Eroare de conexiune. Încearcă din nou.', 'error');
        btn.disabled = false;
        btn.textContent = 'Salvează parola nouă';
      }
    });

    // Începe validarea
    validateToken();
  </script>
</body>
</html>
