<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recuperare Parolă - openBill</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="global.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: var(--space-8);
      box-shadow: var(--shadow-xl);
      animation: fadeIn 0.4s ease-out;
    }

    .auth-header {
      text-align: center;
      margin-bottom: var(--space-6);
    }

    .auth-header img {
      height: 50px;
      width: auto;
      margin-bottom: var(--space-4);
    }

    .auth-header h1 {
      font-size: 1.5rem;
      margin-bottom: var(--space-2);
    }

    .auth-header p {
      color: var(--text-muted);
      margin: 0;
    }

    .form-group {
      margin-bottom: var(--space-5);
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: var(--space-2);
    }

    .form-input {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      font-size: 0.9375rem;
      color: var(--text-primary);
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      transition: all var(--transition-fast);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    #messageBox {
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-lg);
      font-size: 0.9rem;
      line-height: 1.5;
      display: none;
      margin-bottom: var(--space-4);
    }

    #messageBox.show {
      display: block;
    }

    .msg-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger-500);
    }

    .msg-success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: var(--success-400);
    }

    .auth-footer {
      text-align: center;
      margin-top: var(--space-6);
      padding-top: var(--space-6);
      border-top: 1px solid var(--border-color);
    }

    .auth-footer a {
      color: var(--primary-400);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <img src="favicon.svg" alt="openBill">
        <h1>🔐 Recuperare Parolă</h1>
        <p>Introdu emailul asociat contului tău și îți vom trimite un link pentru resetarea parolei.</p>
      </div>

      <div id="messageBox"></div>

      <form id="forgotForm">
        <div class="form-group">
          <label class="form-label" for="email">Email *</label>
          <input type="email" id="email" class="form-input" placeholder="exemplu@companie.ro" required autocomplete="email">
        </div>

        <button type="submit" class="btn btn-primary btn-lg" id="btnSubmit" style="width: 100%;">
          Trimite link de resetare
        </button>
      </form>

      <div class="auth-footer">
        <span style="color: var(--text-muted);">Ți-ai amintit parola?</span>
        <a href="login.html">Autentifică-te</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('forgotForm');
    const btn = document.getElementById('btnSubmit');
    const messageBox = document.getElementById('messageBox');

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className = 'show msg-' + type;
    }

    function hideMessage() {
      messageBox.className = '';
      messageBox.textContent = '';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessage();

      const email = document.getElementById('email').value.trim();

      btn.disabled = true;
      btn.innerHTML = '<div class="loading"></div> Se trimite...';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (res.ok) {
          showMessage('✅ ' + data.message, 'success');
          form.reset();
        } else {
          showMessage(data.error || 'Eroare la trimitere', 'error');
        }
      } catch (err) {
        showMessage('Eroare de conexiune. Încearcă din nou.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Trimite link de resetare';
      }
    });
  </script>
</body>
</html>
